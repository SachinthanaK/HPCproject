<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1500 940"
     font-family="'Segoe UI', 'Calibri', Arial, sans-serif">

  <defs>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F4E79"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2E7D32"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#E65100"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6B6B6B"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="750" y="38" text-anchor="middle"
        font-size="22" font-weight="700" fill="#1F4E79">
    CUDA-Backed Karatsuba Multiplication
  </text>
  <text x="750" y="60" text-anchor="middle"
        font-size="12" fill="#5A7B9E" font-style="italic">
    Host CPU runs recursive Karatsuba split  ·  large leaves (N ≤ 8192) offloaded to GPU grade-school kernel
  </text>

  <!-- Phase labels left -->
  <g font-size="11" font-weight="700" fill="#5A7B9E" font-style="italic">
    <text x="20" y="130">PHASE 1</text>
    <text x="20" y="145">HOST SPLIT</text>

    <text x="20" y="395">PHASE 2</text>
    <text x="20" y="410">DISPATCH</text>
    <text x="20" y="425">(per leaf)</text>

    <text x="20" y="710">PHASE 3</text>
    <text x="20" y="725">HOST COMBINE</text>
  </g>

  <!-- ====== PHASE 1: HOST KARATSUBA SPLIT (top) ====== -->
  <g filter="url(#shadow)">
    <rect x="380" y="90" width="740" height="105" rx="12" ry="12"
          fill="#1F4E79" stroke="#102A43" stroke-width="2"/>
  </g>
  <text x="750" y="118" text-anchor="middle" fill="#FFFFFF"
        font-size="15" font-weight="700">Host CPU  —  Karatsuba Recursive Split</text>
  <text x="750" y="142" text-anchor="middle" fill="#E6F0FA"
        font-size="12">A → (a₁, a₀)        B → (b₁, b₀)</text>
  <text x="750" y="161" text-anchor="middle" fill="#E6F0FA"
        font-size="12">s₁ = a₁ + a₀ ,   s₂ = b₁ + b₀</text>
  <text x="750" y="181" text-anchor="middle" fill="#B8D4F0"
        font-size="11" font-style="italic">recursion runs sequentially on the host; sub-products are not parallel here</text>

  <!-- Down arrows to 3 columns -->
  <g stroke="#1F4E79" stroke-width="1.8" fill="none">
    <line x1="500"  y1="195" x2="250"  y2="225" marker-end="url(#arr-blue)"/>
    <line x1="750"  y1="195" x2="750"  y2="225" marker-end="url(#arr-blue)"/>
    <line x1="1000" y1="195" x2="1250" y2="225" marker-end="url(#arr-blue)"/>
  </g>

  <!-- ============ SUB-PRODUCT HEADER BOXES ============ -->
  <!-- Col 0: z2 -->
  <g filter="url(#shadow)">
    <rect x="30" y="225" width="440" height="68" rx="10" ry="10"
          fill="#2E75B6" stroke="#1F4E79" stroke-width="2"/>
  </g>
  <text x="250" y="252" text-anchor="middle" fill="#FFFFFF"
        font-size="14" font-weight="700">Sub-product z₂</text>
  <text x="250" y="276" text-anchor="middle" fill="#E6F0FA"
        font-size="13">z₂ = a₁ × b₁</text>

  <!-- Col 1: z0 -->
  <g filter="url(#shadow)">
    <rect x="530" y="225" width="440" height="68" rx="10" ry="10"
          fill="#2E75B6" stroke="#1F4E79" stroke-width="2"/>
  </g>
  <text x="750" y="252" text-anchor="middle" fill="#FFFFFF"
        font-size="14" font-weight="700">Sub-product z₀</text>
  <text x="750" y="276" text-anchor="middle" fill="#E6F0FA"
        font-size="13">z₀ = a₀ × b₀</text>

  <!-- Col 2: prod -->
  <g filter="url(#shadow)">
    <rect x="1030" y="225" width="440" height="68" rx="10" ry="10"
          fill="#2E75B6" stroke="#1F4E79" stroke-width="2"/>
  </g>
  <text x="1250" y="252" text-anchor="middle" fill="#FFFFFF"
        font-size="14" font-weight="700">Sub-product prod</text>
  <text x="1250" y="276" text-anchor="middle" fill="#E6F0FA"
        font-size="13">prod = s₁ × s₂</text>

  <!-- down arrows to diamonds -->
  <g stroke="#1F4E79" stroke-width="1.6" fill="none">
    <line x1="250"  y1="293" x2="250"  y2="320" marker-end="url(#arr-blue)"/>
    <line x1="750"  y1="293" x2="750"  y2="320" marker-end="url(#arr-blue)"/>
    <line x1="1250" y1="293" x2="1250" y2="320" marker-end="url(#arr-blue)"/>
  </g>

  <!-- ============ DECISION DIAMONDS ============ -->
  <g filter="url(#shadow)">
    <polygon points="250,322 380,375 250,428 120,375"
             fill="#FFFFFF" stroke="#1F4E79" stroke-width="2"/>
    <polygon points="750,322 880,375 750,428 620,375"
             fill="#FFFFFF" stroke="#1F4E79" stroke-width="2"/>
    <polygon points="1250,322 1380,375 1250,428 1120,375"
             fill="#FFFFFF" stroke="#1F4E79" stroke-width="2"/>
  </g>
  <g text-anchor="middle" font-size="11" font-weight="700" fill="#1F4E79">
    <text x="250" y="364">size  &gt;</text>
    <text x="250" y="382">KARATSUBA_CUDA</text>
    <text x="250" y="400">_THRESHOLD ( 8192 ) ?</text>

    <text x="750" y="364">size  &gt;</text>
    <text x="750" y="382">KARATSUBA_CUDA</text>
    <text x="750" y="400">_THRESHOLD ( 8192 ) ?</text>

    <text x="1250" y="364">size  &gt;</text>
    <text x="1250" y="382">KARATSUBA_CUDA</text>
    <text x="1250" y="400">_THRESHOLD ( 8192 ) ?</text>
  </g>

  <!-- ============ BRANCH ARROWS Yes/No ============ -->
  <!-- Col 0 -->
  <line x1="190" y1="410" x2="135" y2="485"
        stroke="#1F4E79" stroke-width="1.8" marker-end="url(#arr-blue)" fill="none"/>
  <text x="120" y="455" font-size="11" font-weight="700" fill="#1F4E79">Yes</text>
  <line x1="310" y1="410" x2="365" y2="485"
        stroke="#2E7D32" stroke-width="1.8" marker-end="url(#arr-green)" fill="none"/>
  <text x="378" y="455" font-size="11" font-weight="700" fill="#2E7D32">No</text>

  <!-- Col 1 -->
  <line x1="690" y1="410" x2="635" y2="485"
        stroke="#1F4E79" stroke-width="1.8" marker-end="url(#arr-blue)" fill="none"/>
  <text x="620" y="455" font-size="11" font-weight="700" fill="#1F4E79">Yes</text>
  <line x1="810" y1="410" x2="865" y2="485"
        stroke="#2E7D32" stroke-width="1.8" marker-end="url(#arr-green)" fill="none"/>
  <text x="878" y="455" font-size="11" font-weight="700" fill="#2E7D32">No</text>

  <!-- Col 2 -->
  <line x1="1190" y1="410" x2="1135" y2="485"
        stroke="#1F4E79" stroke-width="1.8" marker-end="url(#arr-blue)" fill="none"/>
  <text x="1120" y="455" font-size="11" font-weight="700" fill="#1F4E79">Yes</text>
  <line x1="1310" y1="410" x2="1365" y2="485"
        stroke="#2E7D32" stroke-width="1.8" marker-end="url(#arr-green)" fill="none"/>
  <text x="1378" y="455" font-size="11" font-weight="700" fill="#2E7D32">No</text>

  <!-- ============ OUTCOME BOXES ============ -->
  <!-- Recurse (CPU, blue) — left in each column -->
  <g filter="url(#shadow)">
    <rect x="50"   y="485" width="170" height="80" rx="8" fill="#2E75B6" stroke="#1F4E79" stroke-width="2"/>
    <rect x="550"  y="485" width="170" height="80" rx="8" fill="#2E75B6" stroke="#1F4E79" stroke-width="2"/>
    <rect x="1050" y="485" width="170" height="80" rx="8" fill="#2E75B6" stroke="#1F4E79" stroke-width="2"/>
  </g>
  <g text-anchor="middle" fill="#FFFFFF">
    <text x="135"  y="510" font-size="13" font-weight="700">Recurse on CPU</text>
    <text x="135"  y="530" font-size="11" fill="#E6F0FA">split into 3 more</text>
    <text x="135"  y="546" font-size="11" fill="#E6F0FA">Karatsuba sub-products</text>
    <text x="135"  y="562" font-size="10" font-style="italic" fill="#B8D4F0">(host recursion)</text>

    <text x="635"  y="510" font-size="13" font-weight="700">Recurse on CPU</text>
    <text x="635"  y="530" font-size="11" fill="#E6F0FA">split into 3 more</text>
    <text x="635"  y="546" font-size="11" fill="#E6F0FA">Karatsuba sub-products</text>
    <text x="635"  y="562" font-size="10" font-style="italic" fill="#B8D4F0">(host recursion)</text>

    <text x="1135" y="510" font-size="13" font-weight="700">Recurse on CPU</text>
    <text x="1135" y="530" font-size="11" fill="#E6F0FA">split into 3 more</text>
    <text x="1135" y="546" font-size="11" fill="#E6F0FA">Karatsuba sub-products</text>
    <text x="1135" y="562" font-size="10" font-style="italic" fill="#B8D4F0">(host recursion)</text>
  </g>

  <!-- GPU CUDA-GS (green, GPU-styled) — right in each column -->
  <g filter="url(#shadow)">
    <rect x="280" y="485" width="170" height="80" rx="8"
          fill="#E8F5E9" stroke="#2E7D32" stroke-width="2" stroke-dasharray="6 4"/>
    <rect x="780" y="485" width="170" height="80" rx="8"
          fill="#E8F5E9" stroke="#2E7D32" stroke-width="2" stroke-dasharray="6 4"/>
    <rect x="1280" y="485" width="170" height="80" rx="8"
          fill="#E8F5E9" stroke="#2E7D32" stroke-width="2" stroke-dasharray="6 4"/>
  </g>
  <!-- GPU header strip -->
  <g>
    <rect x="280"  y="485" width="170" height="22" rx="8" fill="#2E7D32"/>
    <rect x="280"  y="498" width="170" height="9" fill="#2E7D32"/>
    <rect x="780"  y="485" width="170" height="22" rx="8" fill="#2E7D32"/>
    <rect x="780"  y="498" width="170" height="9" fill="#2E7D32"/>
    <rect x="1280" y="485" width="170" height="22" rx="8" fill="#2E7D32"/>
    <rect x="1280" y="498" width="170" height="9" fill="#2E7D32"/>
  </g>
  <g text-anchor="middle">
    <text x="365"  y="501" font-size="12" font-weight="700" fill="#FFFFFF">GPU  ·  CUDA-GS</text>
    <text x="365"  y="528" font-size="11" font-weight="700" fill="#1F4E79">cudaMemcpy H↔D</text>
    <text x="365"  y="546" font-size="11" font-weight="700" fill="#1F4E79">grade-school kernel</text>
    <text x="365"  y="560" font-size="10" font-style="italic" fill="#2E7D32">(2N threads)</text>

    <text x="865"  y="501" font-size="12" font-weight="700" fill="#FFFFFF">GPU  ·  CUDA-GS</text>
    <text x="865"  y="528" font-size="11" font-weight="700" fill="#1F4E79">cudaMemcpy H↔D</text>
    <text x="865"  y="546" font-size="11" font-weight="700" fill="#1F4E79">grade-school kernel</text>
    <text x="865"  y="560" font-size="10" font-style="italic" fill="#2E7D32">(2N threads)</text>

    <text x="1365" y="501" font-size="12" font-weight="700" fill="#FFFFFF">GPU  ·  CUDA-GS</text>
    <text x="1365" y="528" font-size="11" font-weight="700" fill="#1F4E79">cudaMemcpy H↔D</text>
    <text x="1365" y="546" font-size="11" font-weight="700" fill="#1F4E79">grade-school kernel</text>
    <text x="1365" y="560" font-size="10" font-style="italic" fill="#2E7D32">(2N threads)</text>
  </g>

  <!-- ============ MERGE TO RESULT CHIP ============ -->
  <g stroke="#1F4E79" stroke-width="1.5" fill="none">
    <!-- Merge arrows from both outcome boxes into the result chip per column -->
    <path d="M 135 565 L 230 605" marker-end="url(#arr-blue)"/>
    <path d="M 365 565 L 270 605" marker-end="url(#arr-blue)"/>
    <path d="M 635 565 L 730 605" marker-end="url(#arr-blue)"/>
    <path d="M 865 565 L 770 605" marker-end="url(#arr-blue)"/>
    <path d="M 1135 565 L 1230 605" marker-end="url(#arr-blue)"/>
    <path d="M 1365 565 L 1270 605" marker-end="url(#arr-blue)"/>
  </g>

  <!-- Result chips -->
  <g font-size="13" font-weight="700">
    <rect x="180"  y="608" width="140" height="28" rx="6" fill="#FFFFFF" stroke="#1F4E79" stroke-width="1.5"/>
    <text x="250"  y="627" text-anchor="middle" fill="#1F4E79">z₂  result</text>

    <rect x="680"  y="608" width="140" height="28" rx="6" fill="#FFFFFF" stroke="#1F4E79" stroke-width="1.5"/>
    <text x="750"  y="627" text-anchor="middle" fill="#1F4E79">z₀  result</text>

    <rect x="1180" y="608" width="140" height="28" rx="6" fill="#FFFFFF" stroke="#1F4E79" stroke-width="1.5"/>
    <text x="1250" y="627" text-anchor="middle" fill="#1F4E79">prod result</text>
  </g>

  <!-- ============ Curving arrows to COMBINE box ============ -->
  <g stroke="#6B6B6B" stroke-width="2" stroke-dasharray="6 4" fill="none">
    <path d="M 250 638 C 250 695, 500 715, 600 745" marker-end="url(#arr-gray)"/>
    <path d="M 750 638 L 750 745"                  marker-end="url(#arr-gray)"/>
    <path d="M 1250 638 C 1250 695, 1000 715, 900 745" marker-end="url(#arr-gray)"/>
  </g>

  <!-- ============ PHASE 3: COMBINE (Host) ============ -->
  <g filter="url(#shadow)">
    <rect x="380" y="745" width="740" height="100" rx="12" ry="12"
          fill="#1F4E79" stroke="#102A43" stroke-width="2"/>
  </g>
  <text x="750" y="772" text-anchor="middle" fill="#FFFFFF"
        font-size="15" font-weight="700">Host CPU  —  Combine</text>
  <text x="750" y="796" text-anchor="middle" fill="#E6F0FA"
        font-size="12">z₁ = prod − z₂ − z₀</text>
  <text x="750" y="816" text-anchor="middle" fill="#E6F0FA"
        font-size="13" font-weight="600">final = z₂ · 10ᴺ + z₁ · 10^(N/2) + z₀</text>
  <text x="750" y="834" text-anchor="middle" fill="#B8D4F0"
        font-size="11" font-style="italic">carry-propagate on host  ·  return result</text>

  <!-- ============ LEGEND ============ -->
  <g transform="translate(120, 865)">
    <rect width="1260" height="65" fill="#FAFBFD" stroke="#C8D2E3" stroke-width="1" rx="8"/>
    <text x="20" y="22" font-size="14" font-weight="700" fill="#1F4E79">Legend</text>

    <g transform="translate(20, 38)">
      <rect x="0" y="0" width="34" height="18" rx="3" fill="#2E75B6" stroke="#1F4E79" stroke-width="1.5"/>
      <text x="44" y="13" font-size="11" fill="#1F4E79">
        <tspan font-weight="700">Host CPU step</tspan>
        <tspan>  — recursion + combine</tspan>
      </text>
    </g>
    <g transform="translate(330, 38)">
      <polygon points="0,9 17,0 34,9 17,18" fill="#FFFFFF" stroke="#1F4E79" stroke-width="1.5"/>
      <text x="44" y="13" font-size="11" fill="#1F4E79">
        <tspan font-weight="700">Threshold decision</tspan>
        <tspan>  — N &gt; 8192 ?</tspan>
      </text>
    </g>
    <g transform="translate(660, 38)">
      <rect x="0" y="0" width="34" height="18" rx="3"
            fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5" stroke-dasharray="5 3"/>
      <text x="44" y="13" font-size="11" fill="#1F4E79">
        <tspan font-weight="700">GPU CUDA-GS kernel</tspan>
        <tspan>  — leaf grade-school multiplication</tspan>
      </text>
    </g>
    <g transform="translate(980, 38)">
      <line x1="0" y1="9" x2="34" y2="9"
            stroke="#6B6B6B" stroke-width="2" stroke-dasharray="6 4"
            marker-end="url(#arr-gray)" fill="none"/>
      <text x="44" y="13" font-size="11" fill="#1F4E79">
        <tspan font-weight="700">Result path</tspan>
        <tspan>  — partial product → host combine</tspan>
      </text>
    </g>
  </g>

</svg>
