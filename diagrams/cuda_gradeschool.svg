<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1500 920"
     font-family="'Segoe UI', 'Calibri', Arial, sans-serif">

  <defs>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F4E79"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#E65100"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2E7D32"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="750" y="38" text-anchor="middle"
        font-size="22" font-weight="700" fill="#1F4E79">
    CUDA Grade-School Multiplication
  </text>
  <text x="750" y="60" text-anchor="middle"
        font-size="12" fill="#5A7B9E" font-style="italic">
    One GPU thread per output digit · O(N²) work parallelised to O(N) wall-clock per kernel
  </text>

  <!-- Phase labels on the left -->
  <g font-size="11" font-weight="700" fill="#5A7B9E" font-style="italic">
    <text x="20" y="115">PHASE 1</text>
    <text x="20" y="130">HOST  → GPU</text>

    <text x="20" y="380">PHASE 2</text>
    <text x="20" y="395">GPU KERNEL</text>
    <text x="20" y="410">PARALLEL</text>

    <text x="20" y="685">PHASE 3</text>
    <text x="20" y="700">GPU  → HOST</text>
    <text x="20" y="715">CARRY</text>
  </g>

  <!-- ===== PHASE 1: HOST (top) ===== -->
  <g filter="url(#shadow)">
    <rect x="380" y="85" width="740" height="100" rx="12" ry="12"
          fill="#1F4E79" stroke="#102A43" stroke-width="2"/>
  </g>
  <text x="750" y="113" text-anchor="middle" fill="#FFFFFF"
        font-size="15" font-weight="700">Host CPU</text>
  <text x="750" y="138" text-anchor="middle" fill="#E6F0FA"
        font-size="12">Operands  A = [a₀, a₁, …, a_{N-1}]  ·  B = [b₀, b₁, …, b_{N-1}]</text>
  <text x="750" y="158" text-anchor="middle" fill="#E6F0FA"
        font-size="12">cudaMalloc( d_A, d_B, d_C )  &amp;  cudaMemcpy ( Host → Device )</text>
  <text x="750" y="176" text-anchor="middle" fill="#B8D4F0"
        font-size="11" font-style="italic">launch kernel &lt;&lt;&lt; blocks, threads &gt;&gt;&gt; (2N total threads)</text>

  <!-- H2D arrow -->
  <line x1="750" y1="185" x2="750" y2="245"
        stroke="#E65100" stroke-width="2.4" marker-end="url(#arr-orange)" fill="none"/>
  <rect x="630" y="200" width="240" height="22" rx="4"
        fill="#FCEEEB" stroke="#E65100" stroke-width="1"/>
  <text x="750" y="216" text-anchor="middle"
        font-size="12" font-weight="700" fill="#E65100">
    cudaMemcpy ( HostToDevice )
  </text>

  <!-- ===== PHASE 2: GPU device container ===== -->
  <g filter="url(#shadow)">
    <rect x="30" y="250" width="1440" height="320" rx="14" ry="14"
          fill="#E8F5E9" stroke="#2E7D32" stroke-width="2.2"
          stroke-dasharray="9 5"/>
  </g>
  <!-- Device header bar -->
  <rect x="30" y="250" width="1440" height="40" rx="14" ry="14"
        fill="#2E7D32"/>
  <rect x="30" y="276" width="1440" height="14" fill="#2E7D32"/>
  <text x="50" y="278" font-size="14" font-weight="700" fill="#FFFFFF">
    GPU Device  (CUDA Kernel:  multiplyKernel&lt;&lt;&lt;blocks, threadsPerBlock&gt;&gt;&gt;)
  </text>
  <text x="1450" y="278" text-anchor="end" font-size="12" font-style="italic" fill="#E8F5E9">
    Total threads = 2N − 1   (one per output digit)
  </text>

  <!-- Formula banner -->
  <rect x="430" y="305" width="640" height="36" rx="6"
        fill="#FFFFFF" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="750" y="328" text-anchor="middle"
        font-size="14" font-weight="700" fill="#1F4E79">
    Each thread k :  C[k]  =  Σ  A[i] · B[j]    where  i + j = k
  </text>

  <!-- Sample thread cells in a row -->
  <g>
    <!-- T0 -->
    <rect x="60" y="370" width="195" height="120" rx="8"
          fill="#76B947" stroke="#2E7D32" stroke-width="1.8"/>
    <rect x="60" y="370" width="195" height="26" rx="8" fill="#2E7D32"/>
    <rect x="60" y="386" width="195" height="10" fill="#2E7D32"/>
    <text x="157" y="389" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Thread 0</text>
    <text x="157" y="424" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">C[0] =</text>
    <text x="157" y="448" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">A[0] · B[0]</text>
    <text x="157" y="478" text-anchor="middle" font-size="10" font-style="italic" fill="#E8F5E9">1 multiplication</text>

    <!-- T1 -->
    <rect x="270" y="370" width="195" height="120" rx="8"
          fill="#76B947" stroke="#2E7D32" stroke-width="1.8"/>
    <rect x="270" y="370" width="195" height="26" rx="8" fill="#2E7D32"/>
    <rect x="270" y="386" width="195" height="10" fill="#2E7D32"/>
    <text x="367" y="389" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Thread 1</text>
    <text x="367" y="421" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">C[1] =</text>
    <text x="367" y="445" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">A[0]·B[1] + A[1]·B[0]</text>
    <text x="367" y="478" text-anchor="middle" font-size="10" font-style="italic" fill="#E8F5E9">2 multiplications</text>

    <!-- T2 -->
    <rect x="480" y="370" width="195" height="120" rx="8"
          fill="#76B947" stroke="#2E7D32" stroke-width="1.8"/>
    <rect x="480" y="370" width="195" height="26" rx="8" fill="#2E7D32"/>
    <rect x="480" y="386" width="195" height="10" fill="#2E7D32"/>
    <text x="577" y="389" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Thread 2</text>
    <text x="577" y="421" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">C[2] =</text>
    <text x="577" y="442" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">A[0]·B[2]+A[1]·B[1]</text>
    <text x="577" y="457" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">+ A[2]·B[0]</text>
    <text x="577" y="478" text-anchor="middle" font-size="10" font-style="italic" fill="#E8F5E9">3 multiplications</text>

    <!-- ellipsis -->
    <text x="725" y="438" text-anchor="middle" font-size="28" font-weight="700" fill="#2E7D32">…</text>

    <!-- Tk (generic) -->
    <rect x="755" y="370" width="220" height="120" rx="8"
          fill="#FFFFFF" stroke="#2E7D32" stroke-width="2.2"/>
    <rect x="755" y="370" width="220" height="26" rx="8" fill="#2E7D32"/>
    <rect x="755" y="386" width="220" height="10" fill="#2E7D32"/>
    <text x="865" y="389" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Thread k  (generic)</text>
    <text x="865" y="421" text-anchor="middle" font-size="12" font-weight="700" fill="#1F4E79">C[k] = Σ A[i]·B[j]</text>
    <text x="865" y="442" text-anchor="middle" font-size="11" fill="#1F4E79" font-style="italic">where i + j = k</text>
    <text x="865" y="478" text-anchor="middle" font-size="10" font-style="italic" fill="#2E7D32">min(k+1, 2N-1-k) muls</text>

    <!-- ellipsis -->
    <text x="1020" y="438" text-anchor="middle" font-size="28" font-weight="700" fill="#2E7D32">…</text>

    <!-- T(2N-2) -->
    <rect x="1050" y="370" width="195" height="120" rx="8"
          fill="#76B947" stroke="#2E7D32" stroke-width="1.8"/>
    <rect x="1050" y="370" width="195" height="26" rx="8" fill="#2E7D32"/>
    <rect x="1050" y="386" width="195" height="10" fill="#2E7D32"/>
    <text x="1147" y="389" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Thread 2N − 2</text>
    <text x="1147" y="421" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">C[2N-2] =</text>
    <text x="1147" y="444" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">A[N-2]·B[N-1]</text>
    <text x="1147" y="458" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">+ A[N-1]·B[N-2]</text>
    <text x="1147" y="478" text-anchor="middle" font-size="10" font-style="italic" fill="#E8F5E9">2 multiplications</text>

    <!-- T(2N-1) -->
    <rect x="1260" y="370" width="195" height="120" rx="8"
          fill="#76B947" stroke="#2E7D32" stroke-width="1.8"/>
    <rect x="1260" y="370" width="195" height="26" rx="8" fill="#2E7D32"/>
    <rect x="1260" y="386" width="195" height="10" fill="#2E7D32"/>
    <text x="1357" y="389" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Thread 2N − 1</text>
    <text x="1357" y="424" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">C[2N-1] =</text>
    <text x="1357" y="448" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">A[N-1] · B[N-1]</text>
    <text x="1357" y="478" text-anchor="middle" font-size="10" font-style="italic" fill="#E8F5E9">1 multiplication</text>
  </g>

  <!-- GPU sync note -->
  <text x="750" y="540" text-anchor="middle"
        font-size="12" font-style="italic" fill="#1F4E79">
    cudaDeviceSynchronize ( )   —   all threads execute concurrently;  no inter-thread synchronisation required
  </text>

  <!-- D2H arrow -->
  <line x1="750" y1="585" x2="750" y2="650"
        stroke="#E65100" stroke-width="2.4" marker-end="url(#arr-orange)" fill="none"/>
  <rect x="620" y="600" width="260" height="22" rx="4"
        fill="#FCEEEB" stroke="#E65100" stroke-width="1"/>
  <text x="750" y="616" text-anchor="middle"
        font-size="12" font-weight="700" fill="#E65100">
    cudaMemcpy ( DeviceToHost )   raw digit sums
  </text>

  <!-- ===== PHASE 3: HOST CARRY ===== -->
  <g filter="url(#shadow)">
    <rect x="380" y="655" width="740" height="100" rx="12" ry="12"
          fill="#1F4E79" stroke="#102A43" stroke-width="2"/>
  </g>
  <text x="750" y="683" text-anchor="middle" fill="#FFFFFF"
        font-size="15" font-weight="700">Host CPU  —  Carry Propagation  ( O(N) )</text>
  <text x="750" y="708" text-anchor="middle" fill="#E6F0FA"
        font-size="12">
    for k = 0 … 2N-1 :   C[k+1] += C[k] / 10 ;   C[k] %= 10 ;
  </text>
  <text x="750" y="728" text-anchor="middle" fill="#E6F0FA"
        font-size="12">
    cudaFree( d_A, d_B, d_C )   →   final product C
  </text>
  <text x="750" y="746" text-anchor="middle" fill="#B8D4F0"
        font-size="11" font-style="italic">
    sequential, executed on host because carries chain across digits
  </text>

  <!-- ====== LEGEND ====== -->
  <g transform="translate(120, 785)">
    <rect width="1260" height="120" fill="#FAFBFD" stroke="#C8D2E3" stroke-width="1" rx="8"/>
    <text x="20" y="26" font-size="14" font-weight="700" fill="#1F4E79">Legend</text>

    <!-- Row 1 -->
    <g transform="translate(20, 42)">
      <rect x="0" y="0" width="36" height="20" rx="3"
            fill="#1F4E79" stroke="#102A43" stroke-width="1.5"/>
      <text x="47" y="15" font-size="12" fill="#1F4E79">
        <tspan font-weight="700">Host CPU</tspan>
        <tspan>  — sequential phases: setup, transfer, carry propagation</tspan>
      </text>
    </g>
    <g transform="translate(640, 42)">
      <rect x="0" y="0" width="36" height="20" rx="3"
            fill="#76B947" stroke="#2E7D32" stroke-width="1.5"/>
      <text x="47" y="15" font-size="12" fill="#1F4E79">
        <tspan font-weight="700">GPU thread</tspan>
        <tspan>  — one CUDA thread per output digit, all run concurrently</tspan>
      </text>
    </g>

    <!-- Row 2 -->
    <g transform="translate(20, 72)">
      <line x1="0" y1="0" x2="36" y2="0"
            stroke="#E65100" stroke-width="2.4" marker-end="url(#arr-orange)"/>
      <text x="47" y="4" font-size="12" fill="#1F4E79">
        <tspan font-weight="700">cudaMemcpy</tspan>
        <tspan>  — PCIe device-memory transfer (host↔device); the main GPU overhead at small N</tspan>
      </text>
    </g>
    <g transform="translate(20, 100)">
      <rect x="0" y="-10" width="36" height="20" rx="3"
            fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5" stroke-dasharray="5 3"/>
      <text x="47" y="4" font-size="12" fill="#1F4E79">
        <tspan font-weight="700">GPU device boundary</tspan>
        <tspan>  — kernel launch context; threads share global memory but no inter-thread sync needed</tspan>
      </text>
    </g>
  </g>

</svg>
