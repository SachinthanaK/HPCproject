<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1460 720"
     font-family="'Segoe UI', 'Calibri', Arial, sans-serif">

  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F4E79"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6B6B6B"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="730" y="38" text-anchor="middle"
        font-size="22" font-weight="700" fill="#1F4E79">
    OpenMP Task Spawning Tree
  </text>
  <text x="730" y="60" text-anchor="middle"
        font-size="12" fill="#5A7B9E" font-style="italic">
    Depth-limited recursive task creation in parallel Karatsuba multiplication
  </text>

  <!-- Depth labels -->
  <g font-size="11" fill="#5A7B9E" font-style="italic">
    <text x="22" y="123">DEPTH 0</text>
    <text x="22" y="253">DEPTH 1</text>
    <text x="22" y="383">DEPTH 2</text>
    <text x="22" y="510">LEAF</text>
  </g>

  <!-- Depth-band guide lines -->
  <g stroke="#E6ECF2" stroke-width="1">
    <line x1="100" y1="135" x2="1450" y2="135"/>
    <line x1="100" y1="265" x2="1450" y2="265"/>
    <line x1="100" y1="395" x2="1450" y2="395"/>
  </g>

  <!-- ============ ROOT (Depth 0) ============ -->
  <g filter="url(#shadow)">
    <rect x="600" y="90" width="260" height="58" rx="10" ry="10"
          fill="#2E75B6" stroke="#1F4E79" stroke-width="2"/>
  </g>
  <text x="730" y="116" text-anchor="middle" fill="#FFFFFF"
        font-size="14" font-weight="700">Parallel Single: Depth 0</text>
  <text x="730" y="135" text-anchor="middle" fill="#E6F0FA"
        font-size="12">(N digits)</text>

  <!-- ============ DEPTH 1 (3 nodes) ============ -->
  <!-- z2 -->
  <g filter="url(#shadow)">
    <rect x="120" y="220" width="200" height="55" rx="9" ry="9"
          fill="#2E75B6" stroke="#1F4E79" stroke-width="2"/>
  </g>
  <text x="220" y="244" text-anchor="middle" fill="#FFFFFF"
        font-size="13" font-weight="700">omp task: z2</text>
  <text x="220" y="262" text-anchor="middle" fill="#E6F0FA"
        font-size="11">(Depth 1)</text>

  <!-- z0 -->
  <g filter="url(#shadow)">
    <rect x="630" y="220" width="200" height="55" rx="9" ry="9"
          fill="#2E75B6" stroke="#1F4E79" stroke-width="2"/>
  </g>
  <text x="730" y="244" text-anchor="middle" fill="#FFFFFF"
        font-size="13" font-weight="700">omp task: z0</text>
  <text x="730" y="262" text-anchor="middle" fill="#E6F0FA"
        font-size="11">(Depth 1)</text>

  <!-- prod (current thread) -->
  <g filter="url(#shadow)">
    <rect x="1140" y="220" width="220" height="55" rx="9" ry="9"
          fill="#2E75B6" stroke="#1F4E79" stroke-width="2"/>
  </g>
  <text x="1250" y="244" text-anchor="middle" fill="#FFFFFF"
        font-size="13" font-weight="700">Current Thread: prod</text>
  <text x="1250" y="262" text-anchor="middle" fill="#E6F0FA"
        font-size="11">(Depth 1)</text>

  <!-- Arrows: Root -> Depth 1 -->
  <g stroke="#1F4E79" stroke-width="1.6" fill="none">
    <line x1="660" y1="148" x2="245" y2="220" marker-end="url(#arrow-blue)"/>
    <line x1="730" y1="148" x2="730" y2="220" marker-end="url(#arrow-blue)"/>
    <line x1="800" y1="148" x2="1225" y2="220" marker-end="url(#arrow-blue)"/>
  </g>

  <!-- ============ DEPTH 2 (9 nodes) ============ -->
  <!-- Under z2 -->
  <g font-size="11" fill="#FFFFFF" text-anchor="middle">
    <g filter="url(#shadow)">
      <rect x="30"  y="350" width="125" height="50" rx="7" ry="7" fill="#2E75B6" stroke="#1F4E79" stroke-width="1.6"/>
    </g>
    <text x="92" y="372" font-weight="600">omp task</text>
    <text x="92" y="388" fill="#E6F0FA">(Depth 2)</text>

    <g filter="url(#shadow)">
      <rect x="170" y="350" width="125" height="50" rx="7" ry="7" fill="#2E75B6" stroke="#1F4E79" stroke-width="1.6"/>
    </g>
    <text x="232" y="372" font-weight="600">omp task</text>
    <text x="232" y="388" fill="#E6F0FA">(Depth 2)</text>

    <g filter="url(#shadow)">
      <rect x="310" y="350" width="125" height="50" rx="7" ry="7" fill="#2E75B6" stroke="#1F4E79" stroke-width="1.6"/>
    </g>
    <text x="372" y="372" font-weight="600">omp task</text>
    <text x="372" y="388" fill="#E6F0FA">(Depth 2)</text>
  </g>

  <!-- Under z0 -->
  <g font-size="11" fill="#FFFFFF" text-anchor="middle">
    <g filter="url(#shadow)">
      <rect x="540" y="350" width="125" height="50" rx="7" ry="7" fill="#2E75B6" stroke="#1F4E79" stroke-width="1.6"/>
    </g>
    <text x="602" y="372" font-weight="600">omp task</text>
    <text x="602" y="388" fill="#E6F0FA">(Depth 2)</text>

    <g filter="url(#shadow)">
      <rect x="680" y="350" width="125" height="50" rx="7" ry="7" fill="#2E75B6" stroke="#1F4E79" stroke-width="1.6"/>
    </g>
    <text x="742" y="372" font-weight="600">omp task</text>
    <text x="742" y="388" fill="#E6F0FA">(Depth 2)</text>

    <g filter="url(#shadow)">
      <rect x="820" y="350" width="125" height="50" rx="7" ry="7" fill="#2E75B6" stroke="#1F4E79" stroke-width="1.6"/>
    </g>
    <text x="882" y="372" font-weight="600">omp task</text>
    <text x="882" y="388" fill="#E6F0FA">(Depth 2)</text>
  </g>

  <!-- Under prod -->
  <g font-size="11" fill="#FFFFFF" text-anchor="middle">
    <g filter="url(#shadow)">
      <rect x="1050" y="350" width="125" height="50" rx="7" ry="7" fill="#2E75B6" stroke="#1F4E79" stroke-width="1.6"/>
    </g>
    <text x="1112" y="372" font-weight="600">omp task</text>
    <text x="1112" y="388" fill="#E6F0FA">(Depth 2)</text>

    <g filter="url(#shadow)">
      <rect x="1190" y="350" width="125" height="50" rx="7" ry="7" fill="#2E75B6" stroke="#1F4E79" stroke-width="1.6"/>
    </g>
    <text x="1252" y="372" font-weight="600">omp task</text>
    <text x="1252" y="388" fill="#E6F0FA">(Depth 2)</text>

    <g filter="url(#shadow)">
      <rect x="1330" y="350" width="125" height="50" rx="7" ry="7" fill="#2E75B6" stroke="#1F4E79" stroke-width="1.6"/>
    </g>
    <text x="1392" y="372" font-weight="600">omp task</text>
    <text x="1392" y="388" fill="#E6F0FA">(Depth 2)</text>
  </g>

  <!-- Arrows: Depth 1 -> Depth 2 -->
  <g stroke="#1F4E79" stroke-width="1.3" fill="none">
    <!-- z2 -->
    <line x1="180" y1="275" x2="92"  y2="350" marker-end="url(#arrow-blue)"/>
    <line x1="220" y1="275" x2="232" y2="350" marker-end="url(#arrow-blue)"/>
    <line x1="260" y1="275" x2="372" y2="350" marker-end="url(#arrow-blue)"/>
    <!-- z0 -->
    <line x1="690" y1="275" x2="602" y2="350" marker-end="url(#arrow-blue)"/>
    <line x1="730" y1="275" x2="742" y2="350" marker-end="url(#arrow-blue)"/>
    <line x1="770" y1="275" x2="882" y2="350" marker-end="url(#arrow-blue)"/>
    <!-- prod -->
    <line x1="1210" y1="275" x2="1112" y2="350" marker-end="url(#arrow-blue)"/>
    <line x1="1250" y1="275" x2="1252" y2="350" marker-end="url(#arrow-blue)"/>
    <line x1="1290" y1="275" x2="1392" y2="350" marker-end="url(#arrow-blue)"/>
  </g>

  <!-- ============ SERIAL FALLBACK (Leaf) ============ -->
  <g filter="url(#shadow)">
    <rect x="20" y="480" width="280" height="58" rx="9" ry="9"
          fill="#F4F4F4" stroke="#6B6B6B" stroke-width="1.8"
          stroke-dasharray="7 4"/>
  </g>
  <text x="160" y="505" text-anchor="middle" fill="#1F4E79"
        font-size="13" font-weight="700">N &lt; 500 or Depth ≥ 4:</text>
  <text x="160" y="524" text-anchor="middle" fill="#1F4E79"
        font-size="12" font-weight="600">Serial Fallback</text>

  <!-- Dashed arrow into fallback -->
  <line x1="92" y1="400" x2="140" y2="480"
        stroke="#6B6B6B" stroke-width="1.4" stroke-dasharray="5 3"
        marker-end="url(#arrow-gray)" fill="none"/>

  <!-- ============ LEGEND ============ -->
  <g transform="translate(810, 470)">
    <rect x="0" y="0" width="630" height="115" rx="8" ry="8"
          fill="#FAFBFD" stroke="#C8D2E3" stroke-width="1"/>
    <text x="20" y="26" font-size="14" font-weight="700" fill="#1F4E79">Legend</text>

    <!-- omp task -->
    <rect x="20" y="42" width="40" height="22" rx="4"
          fill="#2E75B6" stroke="#1F4E79" stroke-width="1.5"/>
    <text x="72" y="58" font-size="12" fill="#1F4E79">
      <tspan font-weight="700">omp task</tspan>
      <tspan>  — parallel subproblem spawned via #pragma omp task</tspan>
    </text>

    <!-- Serial Fallback -->
    <rect x="20" y="78" width="40" height="22" rx="4"
          fill="#F4F4F4" stroke="#6B6B6B" stroke-width="1.5"
          stroke-dasharray="5 3"/>
    <text x="72" y="94" font-size="12" fill="#1F4E79">
      <tspan font-weight="700">Serial Fallback</tspan>
      <tspan>  — threshold cutoff (N &lt; OMP_TASK_THRESHOLD or depth ≥ OMP_MAX_DEPTH)</tspan>
    </text>
  </g>

  <!-- Caption note (bottom) -->
  <text x="730" y="680" text-anchor="middle"
        font-size="11" fill="#5A7B9E" font-style="italic">
    Each parent spawns the three Karatsuba sub-products (z₂, z₀, prod) in parallel;
    one sub-task is executed by the current thread to avoid an extra task overhead.
  </text>

</svg>
